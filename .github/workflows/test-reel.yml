name: Test reel build (no publish)

on: workflow_dispatch

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pillow
      - name: Ensure ffmpeg
        run: ffmpeg -version >/dev/null 2>&1 || (sudo apt-get update -qq && sudo apt-get install -y ffmpeg)
      - name: Build a reel with a placeholder tone (tests the full pipeline)
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          mkdir -p music
          ffmpeg -y -f lavfi -i "sine=frequency=330:duration=20" -c:a libmp3lame music/_tone.mp3
          python daily_post.py --now --emit
          REL="$(cat output/_path.txt)"
          echo "built: $REL ($(du -h "$REL" | cut -f1))"
          ffmpeg -y -ss 3 -i "$REL" -frames:v 1 output/_check_frame.png
          cp "$REL" output/_check_reel.mp4
      - uses: actions/upload-artifact@v4
        with:
          name: reel-check
          path: |
            output/_check_reel.mp4
            output/_check_frame.png
