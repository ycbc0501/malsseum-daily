name: Daily 말씀 Reel

# Fires at 04:40 KST (19:40 UTC). daily_post.py then waits until a random
# moment in 05:00 ± 10 min KST, renders a 9:16 still, builds a still-image Reel
# (image + hymn music) and publishes it to Instagram as a Reel.
on:
  schedule:
    - cron: "40 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pillow

      - name: Ensure ffmpeg
        run: ffmpeg -version >/dev/null 2>&1 || (sudo apt-get update -qq && sudo apt-get install -y ffmpeg)

      - name: Wait for 05:00 KST ±10, render + build the Reel
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python daily_post.py --emit --jitter 600

      - name: Host media on a GitHub Release (keeps git history lean)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REL="$(cat output/_path.txt)"
          FILE="$(basename "$REL")"
          gh release view media >/dev/null 2>&1 || gh release create media --title media --notes "hosted media"
          gh release upload media "$REL" --clobber
          # keep only the 30 newest assets
          gh release view media --json assets -q '.assets[].name' | sort | head -n -30 \
            | while read -r a; do gh release delete-asset media "$a" -y || true; done
          echo "FILE=$FILE" >> "$GITHUB_ENV"

      - name: Publish to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/media/${FILE}"
          echo "URL: $URL"
          if [[ "$FILE" == *.mp4 ]]; then
            python post_instagram.py "$URL" "$(cat output/_caption.txt)" --reel
          else
            python post_instagram.py "$URL" "$(cat output/_caption.txt)"
          fi

      - name: Save rotation counter
        run: |
          git config user.name "malsseum-bot"
          git config user.email "malsseum-bot@users.noreply.github.com"
          git add state.json
          git commit -m "rotate $(cat state.json)" || { echo "nothing to commit"; exit 0; }
          git push
