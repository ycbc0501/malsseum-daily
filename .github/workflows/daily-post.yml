name: Daily 말씀 Reel

# Fires at 03:00 KST (18:00 UTC) — early on purpose: GitHub's scheduler is often
# 1-2h late, so we start early and daily_post.py then WAITS until 05:00 ±10 min KST.
# This absorbs GitHub's delay so the post still lands ~5 AM. (Wait time is free on a public repo.)
on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pillow higgsfield-client

      - name: Wait for 05:00 KST ±10, then render the image (Higgsfield background)
        env:
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
          HF_API_SECRET: ${{ secrets.HF_API_SECRET }}
        run: python daily_post.py --emit --jitter 600

      - name: Host media on a GitHub Release (keeps git history lean)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REL="$(cat output/_path.txt)"
          FILE="$(basename "$REL")"
          gh release view media >/dev/null 2>&1 || gh release create media --title media --notes "hosted media"
          gh release upload media "$REL" --clobber
          # keep only the 30 newest assets
          gh release view media --json assets -q '.assets[].name' | sort | head -n -30 \
            | while read -r a; do gh release delete-asset media "$a" -y || true; done
          echo "FILE=$FILE" >> "$GITHUB_ENV"

      - name: Publish to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/media/${FILE}"
          echo "URL: $URL"
          CMT="$(cat output/_comment.txt)"
          if [[ "$FILE" == *.mp4 ]]; then
            python post_instagram.py "$URL" "$(cat output/_caption.txt)" --reel --comment "$CMT"
          else
            python post_instagram.py "$URL" "$(cat output/_caption.txt)" --comment "$CMT"
          fi

      - name: Save no-repeat ledger
        run: |
          git config user.name "malsseum-bot"
          git config user.email "malsseum-bot@users.noreply.github.com"
          git add state.json
          git commit -m "ledger update" || { echo "nothing to commit"; exit 0; }
          git pull --rebase --autostash origin main || true
          git push
